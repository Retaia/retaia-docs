name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  branch-up-to-date:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify branch contains latest master
        run: |
          git fetch origin master
          MASTER_SHA="$(git rev-parse origin/master)"
          if git merge-base --is-ancestor "$MASTER_SHA" HEAD; then
            echo "Branch is up to date with master."
          else
            echo "Branch is not up to date with master. Rebase on master is required."
            exit 1
          fi

  contract-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify OpenAPI contract snapshots
        run: bash scripts/check-contract-drift.sh

  contract-docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify API contracts vs OpenAPI required surface
        run: node scripts/check-contract-docs-consistency.mjs

  doc-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify documentation index and statuses
        run: bash scripts/check-doc-governance.sh
  openapi-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate OpenAPI specs (v1)
        run: |
          for version in v1; do
            docker run --rm \
              -v "$PWD:/local" \
              openapitools/openapi-generator-cli validate \
              -i "/local/api/openapi/${version}.yaml"
          done
