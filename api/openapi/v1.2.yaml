            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    UserBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User bearer token used by human-operated interactive clients.
    TechnicalBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Technical bearer credential for non-human clients.
        `AGENT_TECHNICAL` uses a bearer token minted from `(client_id, secret_key)`.
        `MCP_TECHNICAL` uses a bearer token minted from an OpenPGP-backed challenge/response flow after UI key enrollment.

  parameters:
    UuidPath:
      name: uuid
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
    ClientIdPath:
      name: client_id
      in: path
      required: true
      schema:
        type: string
    AgentSignatureAgentId:
      name: X-Retaia-Agent-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    AgentSignatureOpenPgpFingerprint:
      name: X-Retaia-OpenPGP-Fingerprint
      in: header
      required: true
      schema:
        type: string
    AgentSignatureValue:
      name: X-Retaia-Signature
      in: header
      required: true
      schema:
        type: string
    AgentSignatureTimestamp:
      name: X-Retaia-Signature-Timestamp
      in: header
      required: true
      schema:
        type: string
        format: date-time
    AgentSignatureNonce:
      name: X-Retaia-Signature-Nonce
      in: header
      required: true
      schema:
        type: string

  schemas:
    AuthLoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        client_id:
          type: string
          description: Optional client identifier. If omitted, server derives one from runtime client identity.
        client_kind:
          $ref: "#/components/schemas/ClientKind"
        otp_code:
          type: string
          description: 6-digit TOTP code when 2FA is enabled on account.
        recovery_code:
          type: string
          description: One-shot backup code when TOTP app is unavailable.

    AuthLoginSuccess:
      type: object
      additionalProperties: false
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access token lifetime in seconds.
        refresh_token:
          type: string
        client_id:
          type: string
          description: Effective client identifier bound to this token.
        client_kind:
          $ref: "#/components/schemas/ClientKind"

    AuthRefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
        client_id:
          type: string
        client_kind:
          $ref: "#/components/schemas/ClientKind"

    WebAuthnAuthenticateOptionsRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        client_id:
          type: string
        client_kind:
          $ref: "#/components/schemas/ClientKind"

    WebAuthnRegisterVerifyRequest:
      type: object
      additionalProperties: false
      required: [credential]
