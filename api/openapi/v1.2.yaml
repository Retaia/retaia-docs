        request_id:
          type: string
        public_key:
          type: object
          additionalProperties: true

    WebAuthnDeviceResponse:
      type: object
      additionalProperties: false
      required: [device_id]
      properties:
        device_id:
          type: string
          format: uuid
        device_label:
          type: string
        webauthn_fingerprint:
          type: string

    AuthEmailRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email

    AuthTokenRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string

    AuthLostPasswordResetRequest:
      type: object
      additionalProperties: false
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string

    AuthCurrentUser:
      type: object
      additionalProperties: true
      required: [email]
      properties:
        uuid:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        email_verified:
          type: boolean
        roles:
          type: array
          items:
            type: string
        mfa_enabled:
          type: boolean

    Auth2faOtpRequest:
      type: object
      additionalProperties: false
      required: [otp_code]
      properties:
        otp_code:
          type: string
          pattern: "^[0-9]{6}$"

    Auth2faSetupResponse:
      type: object
      additionalProperties: false
      required: [method, issuer, account_name, secret, otpauth_uri]
      properties:
        method:
          type: string
          enum: [TOTP]
        issuer:
          type: string
        account_name:
          type: string
          description: Login identifier shown in authenticator app.
        secret:
          type: string
          description: Base32 TOTP secret (show once during setup).
        otpauth_uri:
          type: string
          description: Provisioning URI for authenticator apps.
        qr_svg:
          type: string
          description: Optional inline SVG QR code payload.

    Auth2faEnableResponse:
      type: object
      additionalProperties: false
      required: [mfa_enabled, recovery_codes]
      properties:
        mfa_enabled:
          type: boolean
          enum: [true]
        recovery_codes:
          type: array
          minItems: 1
          items:
            type: string

    Auth2faRecoveryCodesResponse:
      type: object
      additionalProperties: false
      required: [recovery_codes]
      properties:
        recovery_codes:
          type: array
          minItems: 1
          items:
            type: string

    AuthRevokeClientTokenResponse:
      type: object
      additionalProperties: false
      required: [client_id, revoked]
      properties:
        client_id:
          type: string
        revoked:
          type: boolean
        revoked_at:
          type: string
          format: date-time

    AuthClientTokenRequest:
      type: object
      additionalProperties: false
      required: [client_id, client_kind, secret_key]
      properties:
        client_id:
          type: string
        client_kind:
          $ref: "#/components/schemas/NonUiClientKind"
        secret_key:
          type: string

    AuthClientTokenSuccess:
      type: object
      additionalProperties: false
      required: [client_id, client_kind, access_token, token_type]
      properties:
        client_id:
          type: string
        client_kind:
          $ref: "#/components/schemas/TechnicalClientKind"
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access token lifetime in seconds.

    ClientKind:
      type: string
      description: Form factor identifier for interactive login flows.
      enum: [UI_WEB, AGENT]

    NonUiClientKind:
      type: string
      description: Allowed client kinds for AGENT technical secret-key token minting.
      enum: [AGENT]

    TechnicalClientKind:
      type: string
      description: Allowed client kinds for technical bearer tokens.
      enum: [AGENT, MCP]

    AuthRotateClientSecretResponse:
      type: object
      additionalProperties: false
      required: [client_id, secret_key]
      properties:
        client_id:
          type: string
        secret_key:
          type: string
          description: Returned once at rotation time.
        rotated_at:
          type: string
          format: date-time

    AuthMcpRegisterRequest:
      type: object
      additionalProperties: false
      required: [openpgp_public_key, openpgp_fingerprint]
      properties:
        client_label:
          type: string
        openpgp_public_key:
          type: string
        openpgp_fingerprint:
          type: string

    AuthMcpRegisterResponse:
      type: object
      additionalProperties: false
      required: [client_id, client_kind, openpgp_fingerprint]
      properties:
        client_id:
          type: string
        client_kind:
          type: string
          enum: [MCP]
        openpgp_fingerprint:
          type: string
        registered_at:
          type: string
          format: date-time
        rotated_at:
          type: string
          format: date-time

    AuthMcpChallengeRequest:
      type: object
      additionalProperties: false
      required: [client_id, openpgp_fingerprint]
      properties:
        client_id:
          type: string
        openpgp_fingerprint:
          type: string

    AuthMcpChallengeResponse:
      type: object
      additionalProperties: false
      required: [challenge_id, challenge, expires_in]
      properties:
        challenge_id:
          type: string
        challenge:
          type: string
        expires_in:
          type: integer

    AuthMcpTokenRequest:
      type: object
      additionalProperties: false
      required: [client_id, openpgp_fingerprint, challenge_id, signature]
      properties:
        client_id:
          type: string
        openpgp_fingerprint:
          type: string
        challenge_id:
          type: string
        signature:
          type: string

    AuthDeviceStartRequest:
      type: object
      additionalProperties: false
      required: [client_kind]
      properties:
        client_kind:
          $ref: "#/components/schemas/NonUiClientKind"
        client_label:
          type: string

    AuthDeviceStartResponse:
      type: object
      additionalProperties: false
      required: [device_code, user_code, verification_uri, verification_uri_complete, expires_in, interval]
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_uri:
          type: string
          format: uri
        verification_uri_complete:
          type: string
          format: uri
        expires_in:
          type: integer
        interval:
          type: integer

    AuthDevicePollRequest:
      type: object
      additionalProperties: false
      required: [device_code]
      properties:
        device_code:
          type: string

    AuthDevicePollResponse:
      oneOf:
        - $ref: "#/components/schemas/AuthDevicePollPending"
        - $ref: "#/components/schemas/AuthDevicePollApproved"
        - $ref: "#/components/schemas/AuthDevicePollDenied"
        - $ref: "#/components/schemas/AuthDevicePollExpired"

    AuthDevicePollPending:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [PENDING]
        interval:
          type: integer

    AuthDevicePollApproved:
      type: object
      additionalProperties: false
      required: [status, client_id, client_kind, secret_key]
      properties:
        status:
          type: string
          enum: [APPROVED]
        client_id:
          type: string
        client_kind:
          $ref: "#/components/schemas/NonUiClientKind"
        secret_key:
          type: string
          description: One-shot credential shown only once after approval.

    AuthDevicePollDenied:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [DENIED]

    AuthDevicePollExpired:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [EXPIRED]

    AuthDeviceCancelRequest:
      type: object
      additionalProperties: false
      required: [device_code]
      properties:
        device_code:
          type: string

    AuthDeviceCancelResponse:
      type: object
      additionalProperties: false
      required: [canceled]
      properties:
        canceled:
          type: boolean

    ServerPolicy:
      type: object
      description: |
        Runtime server policy returned by Core.
        `feature_flags` is the source of truth for client feature availability.
      required:
        - feature_flags
        - feature_flags_contract_version
        - effective_feature_flags_contract_version
        - accepted_feature_flags_contract_versions
        - feature_flags_compatibility_mode
      additionalProperties: true
      properties:
        min_poll_interval_seconds:
          type: integer
        max_parallel_jobs_allowed:
          type: integer
        allowed_job_types:
          type: array
          items:
            type: string
        quiet_hours:
          type: object
          additionalProperties: true
        feature_flags:
          $ref: "#/components/schemas/FeatureFlags"
        feature_flags_contract_version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
          description: Latest feature-flags contract version served by Core (SemVer).
        accepted_feature_flags_contract_versions:
          type: array
          description: Feature-flags contract versions still accepted by Core for compatibility.
          items:
            type: string
            pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        effective_feature_flags_contract_version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
          description: Feature-flags contract version effectively served to this client request (SemVer).
        feature_flags_compatibility_mode:
          type: string
          enum: [STRICT, COMPAT]
          description: |
            STRICT = latest contract served.
            COMPAT = compatibility profile served (including retired-flag tombstones when required).

    FeatureFlags:
      type: object
      description: |
        Runtime flags controlled by Core.
        Client semantics: missing flag = false, unknown flags are ignored, safe-by-default.
      additionalProperties:
        type: boolean
      properties: {}

    AppFeatureEnabled:
      type: object
      description: |
        Application-level feature switches.
        Effective feature availability requires Core `FeatureFlags` AND `AppFeatureEnabled`.
        `features.ai` controls MCP AI-dependent capabilities (false => MCP AI-dependent functions disabled).
      additionalProperties:
        type: boolean

    UserFeatureEnabled:
      type: object
      description: |
        User-level feature switches.
        Only non-core features can be disabled at user scope.
        Missing key is interpreted as `true` (migration-safe default).
      additionalProperties:
        type: boolean

    EffectiveFeatureEnabled:
      type: object
      description: |
        Effective availability after all gates (`feature_flags`, `app_feature_enabled`, `user_feature_enabled`, dependencies).
        Evaluation order is strict: feature_flags -> app_feature_enabled -> user_feature_enabled -> dependency/escalation rules.
      additionalProperties:
        type: boolean

    FeatureGovernanceRule:
      type: object
      additionalProperties: false
      required: [key, tier, user_can_disable, dependencies, disable_escalation]
      properties:
        key:
          type: string
          description: Feature key. Keys listed in `core_v1_global_features` are protected.
        tier:
          type: string
          enum: [CORE_V1_GLOBAL, OPTIONAL]
        user_can_disable:
          type: boolean
        dependencies:
          type: array
          items:
            type: string
        disable_escalation:
          type: array
          description: |
            Features automatically disabled when this feature is disabled at app/user scope.
          items:
            type: string

    AppFeaturesResponse:
      type: object
      additionalProperties: false
      required:
        - app_feature_enabled
        - feature_governance
        - core_v1_global_features
      properties:
        app_feature_enabled:
          $ref: "#/components/schemas/AppFeatureEnabled"
        core_v1_global_features:
          $ref: "#/components/schemas/CoreV1GlobalFeatures"
        feature_governance:
          type: array
          items:
            $ref: "#/components/schemas/FeatureGovernanceRule"

    AppFeaturesUpdateRequest:
      type: object
      additionalProperties: false
      required: [app_feature_enabled]
      properties:
        app_feature_enabled:
          $ref: "#/components/schemas/AppFeatureEnabled"

    UserFeaturesResponse:
      type: object
      additionalProperties: false
      required: [user_feature_enabled, effective_feature_enabled, feature_governance, core_v1_global_features]
      properties:
        user_feature_enabled:
          $ref: "#/components/schemas/UserFeatureEnabled"
        effective_feature_enabled:
          $ref: "#/components/schemas/EffectiveFeatureEnabled"
        feature_governance:
          type: array
          items:
            $ref: "#/components/schemas/FeatureGovernanceRule"
        core_v1_global_features:
          $ref: "#/components/schemas/CoreV1GlobalFeatures"

    UserFeaturesUpdateRequest:
      type: object
      additionalProperties: false
      required: [user_feature_enabled]
      properties:
        user_feature_enabled:
          $ref: "#/components/schemas/UserFeatureEnabled"

    CoreV1GlobalFeatureKey:
      type: string
      enum:
        - features.core.auth
        - features.core.assets.lifecycle
        - features.core.jobs.runtime
        - features.core.search.query
        - features.core.policy.runtime
        - features.core.derived.access
        - features.core.clients.bootstrap

    CoreV1GlobalFeatures:
      type: array
      uniqueItems: true
      minItems: 1
      description: Canonical list of non-disableable v1 global core feature keys.
      items:
        $ref: "#/components/schemas/CoreV1GlobalFeatureKey"

    AppPolicyResponse:
      type: object
      additionalProperties: false
      required: [server_policy]
      properties:
        server_policy:
          $ref: "#/components/schemas/ServerPolicy"

    AppPolicyUpdateRequest:
      type: object
      additionalProperties: false
      required: [feature_flags]
      properties:
        feature_flags:
          $ref: "#/components/schemas/FeatureFlags"

    AssetState:
      type: string
      enum:
        - DISCOVERED
        - READY
        - PROCESSING_REVIEW
        - PROCESSED
        - DECISION_PENDING
        - DECIDED_KEEP
        - DECIDED_REJECT
        - ARCHIVED
        - REJECTED
        - PURGED

    AssetSummary:
      type: object
      required: [uuid, media_type, state, created_at, updated_at, revision_etag]
      additionalProperties: false
      properties:
        uuid:
          type: string
        name:
          type: string
        media_type:
          type: string
          enum: [VIDEO, PHOTO, AUDIO]
        state:
          $ref: "#/components/schemas/AssetState"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last accepted business mutation on this asset. Informational only; not a write precondition.
        revision_etag:
          type: string
          nullable: true
          description: Strong opaque asset revision tag to be reused in `If-Match` for the next mutation. Changes on any accepted human-visible business mutation and stays stable for purely technical noise with no review/operator impact.
        captured_at:
          type: string
          format: date-time
          nullable: true
        duration:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string
        has_proxy:
          type: boolean
        thumb_url:
          type: string
          nullable: true

    AssetDetail:
      type: object
      required: [summary]
      additionalProperties: false
      properties:
        summary:
          $ref: "#/components/schemas/AssetSummary"
        paths:
          $ref: "#/components/schemas/AssetPaths"
        processing:
          $ref: "#/components/schemas/AssetProcessing"
        derived:
          $ref: "#/components/schemas/AssetDerived"
        transcript:
          $ref: "#/components/schemas/AssetTranscript"
        decisions:
          $ref: "#/components/schemas/AssetDecisions"
        audit:
          $ref: "#/components/schemas/AssetAudit"

    StorageId:
      type: string
      minLength: 1
      description: Stable logical storage identifier emitted by Core and mapped locally by agents.

    RelativeStoragePath:
      type: string
      minLength: 1
      description: >
        Relative storage path only. Must never be absolute, contain parent traversal (`..`),
        or contain null bytes.

    AssetPaths:
      type: object
      additionalProperties: false
      required:
        - storage_id
        - original_relative
      properties:
        storage_id:
          $ref: "#/components/schemas/StorageId"
        original_relative:
          $ref: "#/components/schemas/RelativeStoragePath"
        sidecars_relative:
          type: array
          items:
            $ref: "#/components/schemas/RelativeStoragePath"

    AssetProcessing:
      type: object
      additionalProperties: false
      properties:
        facts_done:
          type: boolean
        thumbs_done:
          type: boolean
        proxy_done:
          type: boolean
        waveform_done:
          type: boolean
        processing_profile:
          type: string
        review_processing_version:
          type: string

    AssetDerived:
      type: object
      additionalProperties: false
      properties:
        proxy_video_url:
          type: string
          nullable: true
        proxy_audio_url:
          type: string
          nullable: true
        proxy_photo_url:
          type: string
          nullable: true
        waveform_url:
          type: string
          nullable: true
          description: |
            Required for any asset with an exploitable audio track once state progresses beyond READY.
            If `media_type=AUDIO` or facts reveal an exploitable audio track, this field MUST be present in all business states beyond READY.
            UI local fallback may exist for degraded playback UX but never replaces the required server/agent-derived waveform.
        thumbs:
          type: array
          items:
            type: string

    AssetTranscript:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [NONE, RUNNING, DONE, FAILED]
        text_preview:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the last accepted business mutation on this asset. Informational only; not a write precondition.
        revision_etag:
          type: string
          description: Strong opaque asset revision tag to be reused in `If-Match` for the next mutation.

    AssetDecisions:
      type: object
      additionalProperties: false
      properties:
        current:
          type: string
          enum: [KEEP, REJECT]
          nullable: true
        history:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              action:
                type: string
                enum: [KEEP, REJECT, CLEAR]
              at:
                type: string
                format: date-time
              by:
                type: string

    AssetAudit:
      type: object
      additionalProperties: false
      properties:
        path_history:
          type: array
          items:
            type: string
        revision_history:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [revision, is_current, validation_status]
            properties:
              revision:
                type: integer
                minimum: 1
              is_current:
                type: boolean
              published_at:
                type: string
                format: date-time
                nullable: true
              validation_status:
                type: string
                enum: [VALIDATED, PENDING_VALIDATION, REJECTED]

    Job:
      type: object
      description: Processing job
      required:
        - job_id
        - job_type
        - status
        - asset_uuid
        - source
        - required_capabilities
      additionalProperties: false
      properties:
        job_id:
          type: string
        job_type:
          type: string
          enum:
            - extract_facts
            - generate_proxy
            - generate_thumbnails
            - generate_audio_waveform
        status:
          type: string
          enum: [pending, claimed, completed, failed]
        asset_uuid:
          type: string
        source:
          allOf:
            - $ref: "#/components/schemas/AssetPaths"
          description: Source locator (relative paths + storage id) for local media access.
        required_capabilities:
          type: array
          items:
            type: string
        claimed_by:
          type: string
          format: uuid
          nullable: true
        lock_token:
          type: string
          nullable: true
        locked_until:
          type: string
          format: date-time
          nullable: true

    JobSubmitRequest:
      oneOf:
        - $ref: "#/components/schemas/SubmitExtractFacts"
        - $ref: "#/components/schemas/SubmitDerived"

    SubmitExtractFacts:
      type: object
      additionalProperties: false
      required: [lock_token, job_type, result]
      properties:
        lock_token:
          type: string
        job_type:
          type: string
          enum: [extract_facts]
        result:
          type: object
          additionalProperties: false
          required: [facts_patch]
          properties:
            facts_patch:
              $ref: "#/components/schemas/FactsPatch"
            warnings:
              type: array
              items:
                type: string
            metrics:
              type: object
              additionalProperties: true

    SubmitDerived:
      type: object
      additionalProperties: false
      required: [lock_token, job_type, result]
      properties:
        lock_token:
          type: string
        job_type:
          type: string
          enum: [generate_proxy, generate_thumbnails, generate_audio_waveform]
        result:
          type: object
          additionalProperties: false
          required: [derived_patch]
          properties:
            derived_patch:
              $ref: "#/components/schemas/DerivedPatch"
            warnings:
              type: array
              items:
                type: string
            metrics:
              type: object
              additionalProperties: true

    ProcessingResultPatch:
      type: object
      additionalProperties: false
      properties:
        facts_patch:
          $ref: "#/components/schemas/FactsPatch"
        derived_patch:
          $ref: "#/components/schemas/DerivedPatch"
        warnings:
          type: array
          items:
            type: string
        metrics:
          type: object
          additionalProperties: true

    FactsPatch:
      type: object
      additionalProperties: false
      properties:
        duration_ms:
          type: integer
        media_format:
          type: string
        video_codec:
          type: string
        audio_codec:
          type: string
        width:
          type: integer
        height:
          type: integer
        fps:
          type: number

    DerivedPatch:
      type: object
      additionalProperties: false
      properties:
        derived_manifest:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [kind, ref]
            properties:
              kind:
                type: string
                enum: [proxy_video, proxy_audio, proxy_photo, thumb, waveform]
              ref:
                type: string
              size_bytes:
                type: integer
              sha256:
                type: string

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message, retryable, correlation_id]
      properties:
        code:
          type: string
          enum:
            - UNAUTHORIZED
            - EMAIL_NOT_VERIFIED
            - FORBIDDEN_SCOPE
            - FORBIDDEN_ACTOR
            - USER_NOT_FOUND
            - STATE_CONFLICT
            - IDEMPOTENCY_CONFLICT
            - STALE_LOCK_TOKEN
            - NAME_COLLISION_EXHAUSTED
            - PURGED
            - VALIDATION_FAILED
            - INVALID_TOKEN
            - LOCK_REQUIRED
            - LOCK_INVALID
            - TOO_MANY_ATTEMPTS
            - MFA_REQUIRED
            - INVALID_2FA_CODE
            - MFA_ALREADY_ENABLED
            - MFA_NOT_ENABLED
            - INVALID_DEVICE_CODE
            - EXPIRED_DEVICE_CODE
            - UNSUPPORTED_FEATURE_FLAGS_CONTRACT_VERSION
            - SLOW_DOWN
            - RATE_LIMITED
            - TEMPORARY_UNAVAILABLE
            - PRECONDITION_REQUIRED
            - PRECONDITION_FAILED
        message:
          type: string
        details:
          type: object
          additionalProperties: true
          description: May include endpoint-specific structured fields such as `current_revision_etag` and `current_state` for asset state conflicts.
        retryable:
          type: boolean
        correlation_id:
          type: string
