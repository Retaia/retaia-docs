openapi: 3.1.0

info:
  title: Retaia Core API
  version: 1.2.0
  description: |
    Reserved OpenAPI v1.2 track for Retaia Core (currently non-planned at product level).

    This API coordinates assets, processing jobs and agents.
    Agents are non-reliable by design.
    Jobs may remain pending indefinitely if no compatible agent is available.
    AI-powered features are planned for v1.1+ and are out of v1 conformance scope.

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Assets
  - name: Agents
  - name: Jobs
  - name: Derived
  - name: Decisions
  - name: Purge
  - name: Ops

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: User login with email and password
      description: Interactive bootstrap/recovery login endpoint for supported human-operated clients (`UI_WEB` and `AGENT`). Supports optional TOTP 2FA code when enabled.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccess"
        "401":
          description: Invalid credentials or 2FA challenge failure (`UNAUTHORIZED`, `MFA_REQUIRED`, `INVALID_2FA_CODE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified (`EMAIL_NOT_VERIFIED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh interactive user bearer token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
      responses:
        "200":
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccess"
        "401":
          description: Invalid or revoked refresh token (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/webauthn/register/options:
    post:
      tags: [Auth]
      summary: Start WebAuthn device registration
      description: |
        Returns one-shot WebAuthn registration options for the authenticated user.
        The returned challenge/options must expire within 5 minutes and must be rejected after first successful use or replay.
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: WebAuthn registration options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthnPublicKeyOptionsResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Registration conflict (`STATE_CONFLICT`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/webauthn/register/verify:
    post:
      tags: [Auth]
      summary: Verify WebAuthn device registration
      description: |
        Verifies a WebAuthn attestation against a still-valid one-shot registration challenge.
        Successful verification consumes the challenge permanently.
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAuthnRegisterVerifyRequest"
      responses:
        "200":
          description: WebAuthn device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthnDeviceResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Registration conflict (`STATE_CONFLICT`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/webauthn/authenticate/options:
    post:
      tags: [Auth]
      summary: Start WebAuthn authentication
      description: |
        Returns one-shot WebAuthn authentication options for a previously enrolled device/browser.
        The returned challenge/options must expire within 5 minutes and must be rejected after first successful use or replay.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAuthnAuthenticateOptionsRequest"
      responses:
        "200":
          description: WebAuthn authentication options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthnPublicKeyOptionsResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/webauthn/authenticate/verify:
    post:
      tags: [Auth]
      summary: Verify WebAuthn authentication
      description: |
        Verifies a WebAuthn assertion against a still-valid one-shot authentication challenge.
        Successful verification consumes the challenge permanently.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAuthnAuthenticateVerifyRequest"
      responses:
        "200":
          description: WebAuthn authentication success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginSuccess"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Setup TOTP 2FA for current user
      description: |
        Starts TOTP enrollment for external authenticator apps (Authy, Google Authenticator, 1Password, etc.).
        Returns provisioning material (`otpauth://` URI and secret) to be confirmed by `/auth/2fa/enable`.
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: TOTP enrollment material generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth2faSetupResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 2FA already enabled (`MFA_ALREADY_ENABLED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/enable:
    post:
      tags: [Auth]
      summary: Confirm and enable TOTP 2FA
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Auth2faOtpRequest"
      responses:
        "200":
          description: 2FA enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth2faEnableResponse"
        "400":
          description: Invalid TOTP code (`INVALID_2FA_CODE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 2FA already enabled (`MFA_ALREADY_ENABLED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Disable TOTP 2FA
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Auth2faOtpRequest"
      responses:
        "200":
          description: 2FA disabled
        "400":
          description: Invalid TOTP code (`INVALID_2FA_CODE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 2FA is not enabled (`MFA_NOT_ENABLED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/recovery-codes/regenerate:
    post:
      tags: [Auth]
      summary: Regenerate backup recovery codes for current user
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: Recovery codes regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth2faRecoveryCodesResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 2FA is not enabled (`MFA_NOT_ENABLED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user token session
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: Logout success
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthCurrentUser"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me/features:
    get:
      tags: [Auth]
      summary: Get current user feature preferences
      description: |
        Returns user-level feature preferences (`user_feature_enabled`) and effective availability.
        Effective availability is computed with AND semantics:
        `feature_flags` AND `app_feature_enabled` AND `user_feature_enabled` AND dependency constraints.
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: Current user feature preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFeaturesResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Auth]
      summary: Update current user feature preferences
      description: |
        Updates user-level feature preferences (`user_feature_enabled`) for the current authenticated user.
        Core v1 global features are protected and cannot be disabled at user scope.
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserFeaturesUpdateRequest"
      responses:
        "200":
          description: Updated current user feature preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFeaturesResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden scope (`FORBIDDEN_SCOPE`) when disabling protected core feature(s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /app/features:
    get:
      tags: [Auth]
      summary: Get effective app feature switches
      description: |
        Returns global app switches (`app_feature_enabled`).
        Also returns dependency/escalation metadata for deterministic client behavior.
        Effective global availability requires Core `feature_flags` AND `app_feature_enabled`.
        Normative gate: when `app_feature_enabled.features.ai=false`, only MCP functions that depend on AI are disabled at runtime.
        Admin-only endpoint.
        Runtime payload contract is stable: `app_feature_enabled`, `feature_governance`, `core_v1_global_features`.
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: Effective app feature switches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppFeaturesResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden actor or scope (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Auth]
      summary: Update effective app feature switches
      description: |
        Updates effective app switches (`app_feature_enabled`).
        Admin-only operation.
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppFeaturesUpdateRequest"
      responses:
        "200":
          description: Updated effective app feature switches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppFeaturesResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden actor or scope (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /app/policy:
    get:
      tags: [Auth]
      summary: Get runtime app policy
      description: |
        Returns runtime `server_policy` including `feature_flags`.
        This endpoint is the canonical runtime policy transport for UI_WEB, AGENT, and MCP clients.
        Clients may optionally send their supported feature-flags contract version for compatibility negotiation.
      security:
        - UserBearerAuth: []
        - TechnicalBearerAuth: []
      parameters:
        - name: client_feature_flags_contract_version
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
            examples: ["1.2.0"]
          description: Optional client-advertised feature-flags contract version (SemVer).
      responses:
        "200":
          description: Runtime app policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPolicyResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "426":
          description: Unsupported feature-flags contract version (`UNSUPPORTED_FEATURE_FLAGS_CONTRACT_VERSION`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Auth]
      summary: Update runtime app policy
      description: |
        Updates runtime `feature_flags` when they are persisted in a mutable backend controlled by Core.
        Requires `UserBearerAuth` and an authenticated admin actor, per AUTHZ matrix.
        Flags still in `code-backed` introduction/validation phase are visible in `GET /app/policy`
        but MUST be rejected by this endpoint with `409 STATE_CONFLICT`.
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppPolicyUpdateRequest"
      responses:
        "200":
          description: Updated runtime app policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPolicyResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden actor or scope (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Flag is not runtime-mutable yet (`STATE_CONFLICT`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/lost-password/request:
    post:
      tags: [Auth]
      summary: Request lost password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailRequest"
      responses:
        "202":
          description: Request accepted
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/lost-password/reset:
    post:
      tags: [Auth]
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLostPasswordResetRequest"
      responses:
        "200":
          description: Password reset success
        "400":
          description: Invalid token (`INVALID_TOKEN`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email/request:
    post:
      tags: [Auth]
      summary: Request verification email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailRequest"
      responses:
        "202":
          description: Request accepted
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid token (`INVALID_TOKEN`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email/admin-confirm:
    post:
      tags: [Auth]
      summary: Admin confirms user email verification
      description: Requires an authenticated admin actor, per AUTHZ matrix (FORBIDDEN_ACTOR or FORBIDDEN_SCOPE on authz failure).
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailRequest"
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Email verified by admin
        "403":
          description: Forbidden actor or scope (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found (`USER_NOT_FOUND`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/clients/{client_id}/revoke-token:
    post:
      tags: [Auth]
      summary: Revoke one technical client token access
      description: |
        Admin-only endpoint for base UI operations.
        Invalidates active bearer token(s) for the targeted technical client.
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientIdPath"
      responses:
        "200":
          description: Client token(s) revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRevokeClientTokenResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden actor or scope (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`). UI interactive client token is protected and cannot be revoked here.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/clients/token:
    post:
      tags: [Auth]
      summary: Mint client bearer token from secret key
      description: |
        Exchanges `(client_id, secret_key)` for a bearer token.
        Normative rule: one active token per AGENT technical client_id; minting a new token revokes the previous one.
        This endpoint is for `AGENT_TECHNICAL` only.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthClientTokenRequest"
      responses:
        "200":
          description: Client token minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthClientTokenSuccess"
        "401":
          description: Invalid client credentials (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden client kind for this flow (`FORBIDDEN_ACTOR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/clients/device/start:
    post:
      tags: [Auth]
      summary: Start device authorization flow for technical client bootstrap
      description: |
        Starts a browser-assisted authorization flow (GitHub-style) for `AGENT_TECHNICAL`.
        User validation (and optional 2FA) happens via `verification_uri`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthDeviceStartRequest"
      responses:
        "200":
          description: Device flow started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthDeviceStartResponse"
        "403":
          description: Forbidden actor (`FORBIDDEN_ACTOR`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/clients/device/poll:
    post:
      tags: [Auth]
      summary: Poll device authorization status
      description: |
        Polls authorization status for a previously started device flow.
        On approval, returns one-shot `secret_key`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthDevicePollRequest"
      responses:
        "200":
          description: Device authorization status (`PENDING`, `APPROVED`, `DENIED`, `EXPIRED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthDevicePollResponse"
        "400":
          description: Invalid device code (`INVALID_DEVICE_CODE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Polling too fast (`SLOW_DOWN` or `TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/clients/device/cancel:
    post:
      tags: [Auth]
      summary: Cancel an in-progress device authorization flow
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthDeviceCancelRequest"
      responses:
        "200":
          description: Device flow canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthDeviceCancelResponse"
        "400":
          description: Invalid or expired device code (`INVALID_DEVICE_CODE` or `EXPIRED_DEVICE_CODE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/mcp/register:
    post:
      tags: [Auth]
      summary: Register MCP technical client public key
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMcpRegisterRequest"
      responses:
        "200":
          description: MCP client registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMcpRegisterResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Registration conflict (`STATE_CONFLICT`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/mcp/challenge:
    post:
      tags: [Auth]
      summary: Create MCP technical auth challenge
      description: |
        Creates a one-shot challenge for `MCP_TECHNICAL`.
        The challenge must expire within 5 minutes and must be rejected after first successful use or replay.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMcpChallengeRequest"
      responses:
        "200":
          description: MCP challenge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMcpChallengeResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/mcp/token:
    post:
      tags: [Auth]
      summary: Mint MCP bearer token from signed challenge
      description: |
        Mints a technical bearer token for `MCP_TECHNICAL` from a valid signature over a still-valid one-shot challenge.
        Expired, replayed or already-consumed challenges must be rejected.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMcpTokenRequest"
      responses:
        "200":
          description: MCP token minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthClientTokenSuccess"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (`TOO_MANY_ATTEMPTS`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/mcp/{client_id}/rotate-key:
    post:
      tags: [Auth]
      summary: Rotate MCP public key
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMcpRegisterRequest"
      responses:
        "200":
          description: MCP key rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMcpRegisterResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Rotation conflict (`STATE_CONFLICT`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/clients/{client_id}/rotate-secret:
    post:
      tags: [Auth]
      summary: Rotate client secret key
      description: |
        Admin-only operation.
        Rotates secret key for one client and invalidates active bearer token(s).
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientIdPath"
      responses:
        "200":
          description: Client secret rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRotateClientSecretResponse"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden actor or scope (`FORBIDDEN_ACTOR` or `FORBIDDEN_SCOPE`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assets:
    get:
      tags: [Assets]
      summary: List assets
      security:
        - UserBearerAuth: []
        - TechnicalBearerAuth: []
      parameters:
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/AssetState"
        - name: media_type
          in: query
          schema:
            type: string
            enum: [VIDEO, PHOTO, AUDIO]
        - name: tags
          in: query
          schema:
            type: string
        - name: has_proxy
          in: query
          schema:
            type: boolean
        - name: tags_mode
          in: query
          schema:
            type: string
            enum: [AND, OR]
        - name: q
          in: query
          schema:
            type: string
          description: Full-text query over filename, notes and transcript_text when available.
        - name: location_country
          in: query
          schema:
            type: string
          description: Country-level location filter (uses secure derived search index).
        - name: location_city
          in: query
          schema:
            type: string
          description: City-level location filter (uses secure derived search index).
        - name: geo_bbox
          in: query
          schema:
            type: string
            example: "4.30,50.80,4.45,50.92"
          description: Bounding box filter `min_lon,min_lat,max_lon,max_lat` (uses secure derived spatial index).
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - name
              - -name
              - created_at
              - -created_at
              - updated_at
              - -updated_at
              - captured_at
              - -captured_at
              - duration
              - -duration
              - media_type
              - -media_type
              - state
              - -state
            example: -created_at
        - name: captured_at_from
          in: query
          schema:
            type: string
            format: date-time
          description: Include assets with `captured_at` greater than or equal to this timestamp (UTC ISO-8601).
        - name: captured_at_to
          in: query
          schema:
            type: string
            format: date-time
          description: Include assets with `captured_at` lower than or equal to this timestamp (UTC ISO-8601).
        - name: limit
          in: query
          schema:
            type: integer
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AssetSummary"
                  next_cursor:
                    type: string
                    nullable: true

  /assets/{uuid}:
    get:
      tags: [Assets]
      summary: Get one asset detail
      security:
        - UserBearerAuth: []
        - TechnicalBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidPath"
      responses:
        "200":
          description: Asset detail
          headers:
            ETag:
              schema:
                type: string
              description: Canonical optimistic concurrency token for subsequent human mutations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDetail"
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Assets]
      summary: Update one asset (metadata and lifecycle transitions)
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidPath"
        - $ref: "#/components/parameters/IfMatchAssetRevision"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
                notes:
                  type: string
                fields:
                  type: object
                  additionalProperties: true
                state:
                  type: string
                  enum: [DECISION_PENDING, DECIDED_KEEP, DECIDED_REJECT, ARCHIVED, REJECTED]
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Asset updated
          headers:
            ETag:
              schema:
                type: string
              description: Strong asset revision tag after the accepted mutation.
        "409":
          description: State conflict (invalid transition)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Stale asset revision (`PRECONDITION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "428":
          description: Missing optimistic concurrency precondition (`PRECONDITION_REQUIRED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Asset is purged
        "422":
          description: Validation failed (`VALIDATION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agents/register:
    post:
      tags: [Agents]
      summary: Register a processing agent
      security:
        - TechnicalBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentSignatureAgentId"
        - $ref: "#/components/parameters/AgentSignatureOpenPgpFingerprint"
        - $ref: "#/components/parameters/AgentSignatureValue"
        - $ref: "#/components/parameters/AgentSignatureTimestamp"
        - $ref: "#/components/parameters/AgentSignatureNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, agent_name, agent_version, openpgp_public_key, openpgp_fingerprint, os_name, os_version, arch, capabilities]
              properties:
                agent_id:
                  type: string
                  format: uuid
                  description: Stable per-agent-instance UUIDv4 generated once and persisted locally by the agent.
                agent_name:
                  type: string
                agent_version:
                  type: string
                openpgp_public_key:
                  type: string
                  description: Agent OpenPGP public key in ASCII-armored format.
                openpgp_fingerprint:
                  type: string
                  description: Canonical OpenPGP fingerprint of the active agent signing key.
                os_name:
                  type: string
                  enum: [linux, macos, windows]
                os_version:
                  type: string
                arch:
                  type: string
                  enum: [x86_64, arm64, armv7, other]
                capabilities:
                  type: array
                  items:
                    type: string
                client_feature_flags_contract_version:
                  type: string
                  pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
                  description: Optional client-advertised feature-flags contract version (SemVer).
                max_parallel_jobs:
                  type: integer
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Agent registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                    format: uuid
                  effective_capabilities:
                    type: array
                    items:
                      type: string
                  capability_warnings:
                    type: array
                    items:
                      type: string
                  server_policy:
                    $ref: "#/components/schemas/ServerPolicy"
        "426":
          description: Unsupported feature-flags contract version (`UNSUPPORTED_FEATURE_FLAGS_CONTRACT_VERSION`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assets/{uuid}/reprocess:
    post:
      tags: [Assets]
      summary: Trigger explicit reprocess
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidPath"
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatchAssetRevision"
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Reprocess accepted
        "412":
          description: Stale asset revision (`PRECONDITION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "428":
          description: Missing optimistic concurrency precondition (`PRECONDITION_REQUIRED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: State conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assets/{uuid}/reopen:
    post:
      tags: [Decisions]
      summary: Reopen archived or rejected asset to decision pending
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidPath"
        - $ref: "#/components/parameters/IfMatchAssetRevision"
      responses:
        "200":
          description: Asset reopened
          headers:
            ETag:
              schema:
                type: string
              description: Strong asset revision tag after the accepted mutation.
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "412":
          description: Stale asset revision (`PRECONDITION_FAILED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "428":
          description: Missing optimistic concurrency precondition (`PRECONDITION_REQUIRED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: State conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      tags: [Jobs]
      summary: List claimable jobs for the authenticated agent
      security:
        - TechnicalBearerAuth: []
      description: |
        Returns jobs with status `pending`
        and compatible with the agent capabilities.
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{job_id}/claim:
    post:
      tags: [Jobs]
      summary: Claim a job (atomic lease)
      security:
        - TechnicalBearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/AgentSignatureAgentId"
        - $ref: "#/components/parameters/AgentSignatureOpenPgpFingerprint"
        - $ref: "#/components/parameters/AgentSignatureValue"
        - $ref: "#/components/parameters/AgentSignatureTimestamp"
        - $ref: "#/components/parameters/AgentSignatureNonce"
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Job claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "409":
          description: Job not claimable

  /jobs/{job_id}/heartbeat:
    post:
      tags: [Jobs]
      summary: Extend job lease
      security:
        - TechnicalBearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/AgentSignatureAgentId"
        - $ref: "#/components/parameters/AgentSignatureOpenPgpFingerprint"
        - $ref: "#/components/parameters/AgentSignatureValue"
        - $ref: "#/components/parameters/AgentSignatureTimestamp"
        - $ref: "#/components/parameters/AgentSignatureNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lock_token]
              properties:
                lock_token:
                  type: string
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Lease extended
          content:
            application/json:
              schema:
                type: object
                properties:
                  locked_until:
                    type: string
                    format: date-time

  /jobs/{job_id}/submit:
    post:
      tags: [Jobs]
      summary: Submit job result patch
      description: |
        Submits one job result patch.
      security:
        - TechnicalBearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AgentSignatureAgentId"
        - $ref: "#/components/parameters/AgentSignatureOpenPgpFingerprint"
        - $ref: "#/components/parameters/AgentSignatureValue"
        - $ref: "#/components/parameters/AgentSignatureTimestamp"
        - $ref: "#/components/parameters/AgentSignatureNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobSubmitRequest"
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Job completed
        "409":
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Invalid or missing lock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{job_id}/fail:
    post:
      tags: [Jobs]
      summary: Mark job as failed
      security:
        - TechnicalBearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AgentSignatureAgentId"
        - $ref: "#/components/parameters/AgentSignatureOpenPgpFingerprint"
        - $ref: "#/components/parameters/AgentSignatureValue"
        - $ref: "#/components/parameters/AgentSignatureTimestamp"
        - $ref: "#/components/parameters/AgentSignatureNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lock_token, error_code, retryable]
              properties:
                lock_token:
                  type: string
                error_code:
                  type: string
                message:
                  type: string
                retryable:
                  type: boolean
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Job failed recorded
        "409":
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assets/{uuid}/derived/upload/init:
    post:
      tags: [Derived]
      summary: Initialize derived upload
      description: |
        Initializes upload for one derived file.
        Normative media profile constraints:
        - `proxy_video`: `video/mp4` (H.264/AVC, browser-compatible), source framerate preserved.
        - `proxy_audio`: `audio/mp4` (AAC-LC) or `audio/mpeg`.
        - `proxy_photo` / `thumb`: `image/jpeg` or `image/webp`.
        - `waveform`: `application/json` (preferred) or `application/octet-stream`.
      security:
        - TechnicalBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UuidPath"
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/AgentSignatureAgentId"
        - $ref: "#/components/parameters/AgentSignatureOpenPgpFingerprint"
        - $ref: "#/components/parameters/AgentSignatureValue"
        - $ref: "#/components/parameters/AgentSignatureTimestamp"
        - $ref: "#/components/parameters/AgentSignatureNonce"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, content_type, size_bytes]
              properties:
                kind:
                  type: string
                  enum: [proxy_video, proxy_audio, proxy_photo, thumb, waveform]
                content_type:
                  type: string
                  description: |
                    MIME type constrained by `kind` (see endpoint description).
                size_bytes:
                  type: integer
                sha256:
                  type: string
      responses:
        "401":
          description: Unauthorized (`UNAUTHORIZED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Upload initialized

  /assets/{uuid}/derived/upload/part:
    post:
      tags: [Derived]
      summary: Upload one part
      security:
        - TechnicalBearerAuth: []
      parameters:
